services:
  # Servicio de la Base de Datos
  sql-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mi-sql-server
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Eyedrops_1234  # <--- Escríbela a fuego aquí (cambia el 1 por 1234 para estar seguros)
    ports:
      - "1434:1433"

  # Tu API
  taskflow-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mi-api-compose
    depends_on:
      - sql-db
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sql-db;Database=TaskFlowDb;User Id=sa;Password=Eyedrops_1234;TrustServerCertificate=True
    extra_hosts:
      - "host.docker.internal:host-gateway"